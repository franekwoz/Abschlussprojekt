{% extends 'index.html' %}{% block content %}<h1>Parameterstudie</h1><form method="post" data-submit>{% for k,v in bike.items() %}<input type="hidden" name="{{k}}" value="{{v}}">{%endfor%}{%for k in ['min_interval_s','max_gap_s','median_window_s','time_constant_s','max_reasonable_speed_kmh']%}<input type="hidden" name="{{k}}" value="{{smooth|attr(k)}}">{%endfor%}<input type="hidden" name="capacity_ah" value="10"><input type="hidden" name="initial_soc" value="1"><input type="hidden" name="n_parallel" value="1"><input type="hidden" name="lipo" value="on"><input type="hidden" name="nmc" value="on"><div class="row g-3"><div class="col"><label>Eigenschaft</label><select class="form-select" name="parameter_name">{%for p in parameters%}<option>{{p}}</option>{%endfor%}</select></div><div class="col"><label>Minimum</label><input class="form-control" name="minimum" type="number" step="any" required></div><div class="col"><label>Maximum</label><input class="form-control" name="maximum" type="number" step="any" required></div><div class="col"><label>Schritte</label><input class="form-control" name="steps" value="5" type="number" min="2" max="50"></div></div><div class="form-check form-switch my-3"><input class="form-check-input" type="checkbox" name="smoothing_enabled" {%if smooth.enabled%}checked{%endif%}><label>Geschwindigkeitsglättung</label></div><button class="btn btn-primary">Studie starten</button></form>{%endblock%}
